<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Helios Astro</title>
  <style>
    body{margin:0;background:#050814;color:#eef5ff;font-family:Arial,Helvetica,sans-serif}
    .wrap{max-width:860px;margin:0 auto;padding:24px}
    .panel{background:#0c1320;border:1px solid rgba(91,214,255,.18);border-radius:24px;padding:28px}
    label{display:block;margin:14px 0 8px}
    input,textarea{width:100%;padding:14px;border-radius:14px;border:1px solid rgba(91,214,255,.18);background:#09101b;color:#eef5ff}
    button{margin-top:18px;padding:14px 22px;border:none;border-radius:999px;background:#45ddff;color:#00131c;font-weight:800}
    p{color:#b5c7e8}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <h1>Contact</h1>
      <p>Pour toute demande d’information, d’accompagnement ou de thème personnalisé, utilisez ce formulaire.</p>
      <label>Nom</label>
      <input type="text" placeholder="Votre nom">
      <label>Email</label>
      <input type="email" placeholder="Votre email">
      <label>Message</label>
      <textarea rows="8" placeholder="Votre message"></textarea>
      <button type="button">Envoyer</button>
    </div>
  </div>
</body>
</html>
