<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Helios Astro Expert</title>
  <meta name="description" content="Logiciel expert Helios Astro pour analyse complète des thèmes.">
  <link rel="stylesheet" href="assets/expert.css">
</head>
<body>
  <main class="app-shell">
    <aside class="sidebar">
      <h1>Helios Astro Expert</h1>
      <p class="subtitle">Version privée d’analyse complète</p>

      <label>Nom
        <input type="text" id="expert-name" placeholder="Consultant">
      </label>

      <label>Date
        <input type="date" id="expert-date">
      </label>

      <label>Heure
        <input type="time" id="expert-time" value="12:00">
      </label>

      <label>Ville
        <input type="text" id="expert-city" placeholder="Paris">
      </label>

      <label>Pays
        <input type="text" id="expert-country" placeholder="France">
      </label>

      <label>Latitude
        <input type="number" step="0.000001" id="expert-latitude" placeholder="48.8566">
      </label>

      <label>Longitude
        <input type="number" step="0.000001" id="expert-longitude" placeholder="2.3522">
      </label>

      <label>Système de maisons
        <select id="expert-house-system">
          <option value="P">Placidus</option>
          <option value="W">Whole Sign</option>
        </select>
      </label>

      <div class="button-stack">
        <button id="generate-btn">Calculer le thème</button>
        <button id="demo-btn" class="secondary">Démo</button>
        <button id="save-btn" class="secondary">Sauvegarder</button>
        <button id="load-btn" class="secondary">Recharger le dernier thème</button>
        <button id="export-json-btn" class="secondary">Exporter JSON</button>
      </div>

      <div class="panel" id="status-box"></div>
    </aside>

    <section class="content">
      <div class="panel">
        <h2>Synthèse rapide</h2>
        <div id="summary-box"></div>
      </div>

      <div class="grid-two">
        <div class="panel">
          <h2>Planètes</h2>
          <div id="planets-box"></div>
        </div>

        <div class="panel">
          <h2>Ascendant / MC / Maisons</h2>
          <div id="houses-box"></div>
        </div>
      </div>

      <div class="panel">
        <h2>Aspects</h2>
        <div id="aspects-box"></div>
      </div>

      <div class="panel">
        <h2>Interprétation experte</h2>
        <div id="interpretation-box"></div>
      </div>

      <div class="panel">
        <h2>Notes privées</h2>
        <textarea id="private-notes" rows="10" placeholder="Notes personnelles, pistes d’interprétation, observations client..."></textarea>
      </div>
    </section>
  </main>

  <script src="assets/expert.js"></script>
</body>
</html>
